{{- /* 7-step pipeline diagram, inline SVG */ -}}
<figure class="about-diagram about-pipeline" role="img" aria-label="7단계 파이프라인 다이어그램">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" preserveAspectRatio="xMidYMid meet">
    <defs>
      <marker id="abp-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
      </marker>
    </defs>
    {{- $steps := slice
      (dict "x" 30  "label" "Moderator" "sub" "발제" "color" "gold")
      (dict "x" 140 "label" "Black"     "sub" "역발상" "color" "black")
      (dict "x" 250 "label" "White"     "sub" "정석"   "color" "white")
      (dict "x" 360 "label" "Hugo Fmt"  "sub" "정형화" "color" "neutral")
      (dict "x" 470 "label" "Assembler" "sub" "병합"   "color" "neutral")
      (dict "x" 580 "label" "Sync"      "sub" "배포 push" "color" "neutral")
      (dict "x" 690 "label" "PR"        "sub" "아카이브"  "color" "neutral")
    -}}
    {{- range $i, $s := $steps }}
      {{- $cls := printf "abp-step abp-step--%s" $s.color -}}
      <g class="{{ $cls }}" transform="translate({{ $s.x }},60)">
        <rect class="abp-step__box" x="0" y="0" width="80" height="80" rx="10"/>
        <text class="abp-step__num" x="40" y="22" text-anchor="middle">{{ add $i 1 }}</text>
        <text class="abp-step__label" x="40" y="46" text-anchor="middle">{{ $s.label }}</text>
        <text class="abp-step__sub" x="40" y="64" text-anchor="middle">{{ $s.sub }}</text>
      </g>
      {{- if lt $i 6 }}
        {{- $x1 := add $s.x 80 -}}
        {{- $x2 := add $s.x 110 -}}
        <line class="abp-arrow" x1="{{ $x1 }}" y1="100" x2="{{ $x2 }}" y2="100" marker-end="url(#abp-arrow)"/>
      {{- end }}
    {{- end }}
    <text class="abp-caption" x="400" y="180" text-anchor="middle">매 3시간 (cron 0 */3 * * *) · 7단계 · self-hosted runner</text>
  </svg>
</figure>
