{{- /* Meta prompt loop diagram, circular flow */ -}}
<figure class="about-diagram about-loop" role="img" aria-label="메타 프롬프트 개선 루프">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" preserveAspectRatio="xMidYMid meet">
    <defs>
      <marker id="abl-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
      </marker>
    </defs>
    {{- /* 3 circular stations */ -}}
    {{- $stations := slice
      (dict "cx" 90  "cy" 130 "label" "Output Collector"  "sub" "결과 수집")
      (dict "cx" 240 "cy" 60  "label" "Quality Analyzer"  "sub" "정량·정성 평가")
      (dict "cx" 390 "cy" 130 "label" "Prompt Optimizer"  "sub" "GUIDELINES PR")
    -}}
    {{- range $i, $s := $stations }}
      <g class="abl-station abl-station--{{ $i }}" transform="translate({{ $s.cx }},{{ $s.cy }})">
        <circle class="abl-station__circle" cx="0" cy="0" r="48"/>
        <text class="abl-station__num" x="0" y="-12" text-anchor="middle">{{ add $i 1 }}</text>
        <text class="abl-station__label" x="0" y="10" text-anchor="middle">{{ $s.label }}</text>
        <text class="abl-station__sub" x="0" y="28" text-anchor="middle">{{ $s.sub }}</text>
      </g>
    {{- end }}
    <path class="abl-arc" d="M 138 130 Q 165 60 192 60" fill="none" marker-end="url(#abl-arrow)"/>
    <path class="abl-arc" d="M 288 60 Q 315 60 342 130" fill="none" marker-end="url(#abl-arrow)"/>
    <path class="abl-arc" d="M 360 165 Q 240 240 120 165" fill="none" marker-end="url(#abl-arrow)"/>
    <text class="abl-loop-caption" x="240" y="215" text-anchor="middle">하루 두 번 (KST 06:00 / 18:00)</text>
  </svg>
</figure>
