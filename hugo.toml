baseURL = 'https://investment-insights-blog.vercel.app/'
languageCode = 'ko-KR'
defaultContentLanguage = 'ko'
hasCJKLanguage = true
title = '🚀 흑백에이전트: 투자 계급 전쟁'
theme = 'PaperMod'

# 빌드 설정
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true

# 페이지네이션 (Hugo 0.128.0+ 호환)
[pagination]
  pagerSize = 10

[params]
  # 기본 설정
  env = "production"
  author = "AI Investment Analyst"
  authorStyle = "combined" # Options: name, title, combined, hardcoded
  description = "AI가 분석하는 글로벌 투자 인사이트"
  # 사이트 단위 OG 이미지 fallback — 각 글의 cover.image가 없을 때 PaperMod가 자동 사용
  images = ["/images/og-default.png"]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecialChars = false
  disableScrollToTop = false
  hideSummary = false
  showtoc = true
  tocopen = false

  # 브랜드 라벨 (헤더)
  [params.label]
    text = "흑백에이전트"
    iconSVG = '''<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M8 5c0 2.1 1.8 3.8 4 3.8S16 7.1 16 5 14.2 1.2 12 1.2 8 2.9 8 5Z" stroke="currentColor" stroke-width="1.8"/><path d="M12 8.8v12.7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>'''

  # 테마 컬러(브라우저 UI)
  [params.assets]
    theme_color = "#07070a"
    msapplication_TileColor = "#07070a"

  # 홈 프로필
  [params.homeInfoParams]
    Title = "🚀 AI 기반 투자 인사이트"
    Content = "글로벌 시장 동향을 AI가 분석하여 균형 잡힌 투자 인사이트를 제공합니다."

  # 소셜 아이콘
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/grrulssa"

  # 검색 설정
  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "description", "summary", "excerpt", "permalink"]

# 메뉴
[menu]
  [[menu.main]]
    identifier = "search"
    name = "검색"
    url = "/search/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "태그"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "categories"
    name = "카테고리"
    url = "/categories/"
    weight = 30
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 35
  [[menu.main]]
    identifier = "archives"
    name = "아카이브"
    url = "/archives/"
    weight = 40

# 출력 포맷
[outputs]
  home = ["HTML", "RSS", "JSON"]

# 마크다운 설정
[markup]
  [markup.highlight]
    noClasses = false
    anchorLineNos = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokai"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
